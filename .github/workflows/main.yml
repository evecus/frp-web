name: Build frps-web & frpc-web

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - target: windows-arm64
            goos: windows
            goarch: arm64
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Create dist dir
        run: mkdir -p dist

      - name: Build frpc-web
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          OUT="dist/frpc-web-${{ matrix.target }}${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/fatedier/frp/pkg/util/version.version=${GITHUB_REF_NAME:-dev}" \
            -o "${OUT}" \
            ./cmd/frpc-web/
          echo "Built: ${OUT} ($(du -sh "${OUT}" | cut -f1))"

      - name: Build frps-web
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          OUT="dist/frps-web-${{ matrix.target }}${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/fatedier/frp/pkg/util/version.version=${GITHUB_REF_NAME:-dev}" \
            -o "${OUT}" \
            ./cmd/frps-web/
          echo "Built: ${OUT} ($(du -sh "${OUT}" | cut -f1))"

      - name: Package archives
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "frp-web-${{ matrix.target }}.zip" \
              "frpc-web-${{ matrix.target }}${{ matrix.ext }}" \
              "frps-web-${{ matrix.target }}${{ matrix.ext }}"
          else
            tar -czf "frp-web-${{ matrix.target }}.tar.gz" \
              "frpc-web-${{ matrix.target }}" \
              "frps-web-${{ matrix.target }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frp-web-${{ matrix.target }}
          path: |
            dist/frpc-web-${{ matrix.target }}${{ matrix.ext }}
            dist/frps-web-${{ matrix.target }}${{ matrix.ext }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List files
        run: find artifacts/ -type f | sort

      - name: Create archives for release
        run: |
          mkdir -p release
          for t in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            tar -czf "release/frp-web-${t}.tar.gz" \
              -C artifacts \
              "frpc-web-${t}" "frps-web-${t}" \
              2>/dev/null || true
          done
          for t in windows-amd64 windows-arm64; do
            zip "release/frp-web-${t}.zip" \
              "artifacts/frpc-web-${t}.exe" \
              "artifacts/frps-web-${t}.exe" \
              2>/dev/null || true
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          body: |
            ## frp-web ${{ github.ref_name }}

            | 文件 | 说明 |
            |------|------|
            | `frpc-web` | frpc 客户端 + 内嵌 Web 管理面板 |
            | `frps-web` | frps 服务端 + 内嵌 Web 管理面板 |

            ```bash
            ./frps-web                      # 服务端面板，监听 0.0.0.0:7500
            ./frpc-web                      # 客户端面板，监听 127.0.0.1:7777
            # 默认账号: admin / admin
            # 数据目录: 二进制同目录下 data/
            ```
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS.txt
